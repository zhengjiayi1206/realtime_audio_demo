<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --text: #1f2329;
        --muted: #7a808a;
        --line: #edf0f4;
        --soft: #f6f8fb;
        --blue: #4ea2ff;
        --cyan: #adfff2;
        --pink: #ffc2dd;
        --danger: #ff5548;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        padding: clamp(18px, 2.6vw, 34px) clamp(22px, 4vw, 60px) 22px;
      }

      .stage {
        width: min(1360px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(280px, 390px);
        align-items: center;
        gap: clamp(80px, 12vw, 220px);
        padding: 0;
      }

      .answer {
        min-height: 320px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
      }

      .hint {
        margin-bottom: 18px;
        color: var(--muted);
        font-size: clamp(18px, 2vw, 24px);
        line-height: 1.4;
        text-align: left;
      }

      .hint strong {
        color: var(--text);
      }

      #resultText {
        width: 100%;
        min-height: 200px;
        max-height: min(62vh, 560px);
        overflow: auto;
        font-size: clamp(21px, 2vw, 29px);
        line-height: 1.62;
        letter-spacing: 0;
        white-space: pre-wrap;
      }

      #resultText:empty {
        display: none;
      }

      .orb-panel {
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 14px;
        min-height: 320px;
        justify-self: end;
      }

      .orb {
        width: min(30vw, 300px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          radial-gradient(circle at 45% 35%, rgba(80, 155, 255, 0.92), rgba(80, 155, 255, 0) 34%),
          radial-gradient(circle at 23% 62%, rgba(174, 255, 242, 0.9), rgba(174, 255, 242, 0) 42%),
          radial-gradient(circle at 67% 68%, rgba(255, 186, 220, 0.72), rgba(255, 186, 220, 0) 38%),
          linear-gradient(135deg, #bffbf6, #75baff 48%, #e3f9ff);
        filter: blur(0.2px);
        box-shadow: 0 24px 90px rgba(70, 155, 255, 0.18);
        transform: scale(0.92);
        transition: transform 300ms ease, filter 300ms ease, opacity 300ms ease;
      }

      .orb.listening {
        animation: breathe 1.8s ease-in-out infinite;
      }

      .orb.speaking {
        animation: pulse 1.05s ease-in-out infinite;
        background:
          radial-gradient(circle at 36% 34%, rgba(190, 116, 255, 0.72), rgba(190, 116, 255, 0) 35%),
          radial-gradient(circle at 23% 70%, rgba(255, 229, 171, 0.78), rgba(255, 229, 171, 0) 40%),
          radial-gradient(circle at 64% 68%, rgba(255, 122, 190, 0.72), rgba(255, 122, 190, 0) 36%),
          linear-gradient(135deg, #dbf8ff, #f4ceff 54%, #ffd9eb);
      }

      .orb.thinking {
        opacity: 0.74;
        animation: breathe 1.2s ease-in-out infinite;
      }

      .voice-status {
        text-align: center;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.4;
      }

      .voice-status::before {
        content: "";
        display: block;
        width: 52px;
        height: 16px;
        margin: 0 auto 8px;
        border-radius: 999px;
        background:
          radial-gradient(circle, #85818a 0 6px, transparent 7px) 0 50% / 17px 16px repeat-x;
      }

      .controls {
        display: grid;
        justify-items: center;
      }

      .action-wrap {
        display: grid;
        place-items: center;
      }

      .action-button {
        min-width: 150px;
        min-height: 52px;
        border: 0;
        border-radius: 999px;
        background: #f2f3f5;
        color: #181b20;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 22px;
        font: inherit;
        font-size: 18px;
        font-weight: 650;
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, color 160ms ease;
      }

      .action-button:active {
        transform: scale(0.96);
      }

      .action-button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .action-button.recording,
      .action-button.finalizing,
      .action-button.speaking {
        background: #f2f3f5;
        color: var(--danger);
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(0.9);
        }

        50% {
          transform: scale(0.97);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.94);
          filter: saturate(1);
        }

        50% {
          transform: scale(1.01);
          filter: saturate(1.16);
        }
      }

      @media (max-width: 820px) {
        .page {
          padding: 18px 22px 18px;
        }

        .stage {
          min-height: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 18px;
        }

        .answer {
          min-height: 180px;
          width: 100%;
          justify-content: flex-start;
          align-items: center;
        }

        .hint {
          margin: 20px 0 8px;
          font-size: 20px;
          text-align: center;
        }

        #resultText {
          min-height: 180px;
          max-height: 46vh;
          font-size: 25px;
          line-height: 1.58;
        }

        .orb-panel {
          min-height: 260px;
          width: 100%;
        }

        .orb {
          width: min(58vw, 260px);
        }

        .voice-status {
          font-size: 19px;
        }

        .action-button {
          min-width: 128px;
          min-height: 50px;
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage">
        <div class="answer">
          <div id="hint" class="hint">试着问我 <strong>“紫背菜能不能吃”</strong></div>
          <div id="resultText"></div>
        </div>

        <div class="orb-panel">
          <div id="orb" class="orb"></div>
          <div id="voiceState" class="voice-status">倾听中</div>
        </div>
      </section>

      <footer class="controls">
        <div class="action-wrap">
          <button id="actionBtn" class="action-button" aria-label="开始对话">
            开始对话
          </button>
        </div>
      </footer>
    </main>

    <script type="module">
      import { RealtimeAudioClient } from "/static/realtime-audio-client.js?v=voice-history-20260612";

      const els = {
        actionBtn: document.getElementById("actionBtn"),
        hint: document.getElementById("hint"),
        orb: document.getElementById("orb"),
        resultText: document.getElementById("resultText"),
        voiceState: document.getElementById("voiceState"),
      };

      let model = "";
      let prompt =
        "你正在和用户进行实时语音对话。请直接理解用户想问什么，不要转写、复述或翻译语音内容。回答要像真人聊天一样自然、口语化、简短，优先用一两句话说清楚。只有问题确实复杂时再分点说明；不要啰嗦，不要输出无关解释。";
      let autoConversation = false;
      let restartTimer = null;
      let startInFlight = false;

      const client = new RealtimeAudioClient({
        recorderWorkletUrl: "/static/recorder-worklet.js?v=demo-vad-guard-20260611",
        useWebAudioPlayback: true,
        enableBargeIn: true,
        bargeInAfterFinalResultOnly: true,
        bargeInChunkMs: 120,
        bargeInCooldownMs: 900,
        getModel: () => model,
        getPrompt: () => prompt,
        getPrefillMs: () => 600,
        getDisplayedText: () => els.resultText.textContent,
        getOutputAudio: () => true,
        getStreamSpeechAudio: () => true,
        getVadConfig: () => ({
          engine: "silero",
          threshold: 0.5,
          minSpeechMs: 180,
          minSilenceMs: 450,
          maxSpeechMs: 30000,
          speechPadMs: 30,
        }),
        getBargeInVadConfig: () => ({
          engine: "silero",
          threshold: 0.92,
          minSpeechMs: 350,
          minSilenceMs: 650,
          maxSpeechMs: 6000,
          speechPadMs: 30,
        }),
      });

      function renderMode(mode) {
        els.actionBtn.disabled = mode === "busy";
        els.actionBtn.className = `action-button ${mode}`;
        els.actionBtn.setAttribute("aria-label", autoConversation ? "结束对话" : "开始对话");
        if (mode === "idle") {
          els.actionBtn.textContent = autoConversation ? "结束对话" : "开始对话";
          setOrbMode("");
        } else if (mode === "recording") {
          els.actionBtn.textContent = "结束对话";
          setOrbMode("listening");
        } else if (mode === "finalizing") {
          els.actionBtn.textContent = "结束对话";
          setOrbMode("thinking");
        } else if (mode === "speaking") {
          els.actionBtn.textContent = "结束对话";
          setOrbMode("speaking");
        } else {
          els.actionBtn.textContent = "处理中";
        }

        if (mode === "idle" && autoConversation) {
          scheduleRestart();
        }
      }

      function setOrbMode(mode) {
        els.orb.className = mode ? `orb ${mode}` : "orb";
      }

      client.on("config", ({ config }) => {
        model = config.model || "";
        prompt = config.default_prompt || prompt;
      });
      client.on("mode", ({ mode }) => renderMode(mode));
      client.on("vad", ({ event }) => {
        if (event === "speech_start") {
          els.hint.hidden = true;
        }
      });
      client.on("bargeIn", () => {
        els.hint.hidden = true;
        els.voiceState.textContent = "检测到插话";
      });
      client.on("voiceState", ({ text }) => {
        els.voiceState.textContent = text;
      });
      client.on("status", () => {});
      client.on("log", ({ message }) => {
        console.debug("[demo]", message);
      });
      client.on("clearLog", () => {});
      client.on("metrics", () => {});
      client.on("result", ({ text, append, replace }) => {
        if (replace && text === "录音中。") {
          els.resultText.textContent = "";
          return;
        }
        els.hint.hidden = true;
        if (append) {
          els.resultText.textContent += text || "";
        } else if (replace) {
          els.resultText.textContent = text || "";
        }
      });

      els.actionBtn.addEventListener("click", () => {
        if (autoConversation) {
          stopConversation();
        } else {
          startConversation();
        }
      });

      async function startConversation() {
        if (startInFlight) return;
        startInFlight = true;
        autoConversation = true;
        els.hint.hidden = false;
        els.resultText.textContent = "";
        client.setMode("busy");
        client.setVoiceState("准备中");
        try {
          await client.unlockAudioOutput();
          if (!autoConversation) return;
          await client.startRecording();
        } catch (err) {
            autoConversation = false;
            client.setMode("idle");
            client.setVoiceState("倾听中");
            console.error(err);
        } finally {
          startInFlight = false;
          renderMode(client.state.mode);
        }
      }

      function stopConversation() {
        autoConversation = false;
        startInFlight = false;
        clearRestartTimer();
        client.stopPlayback();
        client.stopBargeInMonitor();
        client.stopInputDevices();
        client.closeWs();
        client.setMode("idle");
        client.setVoiceState("倾听中");
        renderMode("idle");
      }

      function scheduleRestart() {
        if (restartTimer || client.state.mode !== "idle") return;
        restartTimer = setTimeout(() => {
          restartTimer = null;
          if (!autoConversation || client.state.mode !== "idle") return;
          client.startRecording().catch((err) => {
            autoConversation = false;
            client.setMode("idle");
            client.setVoiceState("倾听中");
            console.error(err);
          });
        }, 550);
      }

      function clearRestartTimer() {
        if (!restartTimer) return;
        clearTimeout(restartTimer);
        restartTimer = null;
      }

      renderMode("idle");
      client.loadServerConfig().catch((err) => console.error(err));
    </script>
  </body>
</html>
