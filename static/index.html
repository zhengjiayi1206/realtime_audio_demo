<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qwen3-Omni 实时语音测试</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --line: #d9dde3;
        --text: #171b22;
        --muted: #5c6675;
        --accent: #0f766e;
        --danger: #b42318;
        --ok: #067647;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .status {
        min-width: 220px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        font-size: 14px;
        text-align: right;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 16px;
        line-height: 1.3;
        letter-spacing: 0;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 11px;
        color: var(--text);
        background: #fff;
        font: inherit;
      }

      textarea {
        min-height: 118px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 16px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .secondary {
        background: white;
        color: var(--text);
        border-color: var(--line);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 14px;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 18px;
        letter-spacing: 0;
      }

      #log {
        height: 360px;
        overflow: auto;
        margin: 0;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #101418;
        color: #e6edf3;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .result {
        margin-top: 14px;
      }

      #resultText {
        min-height: 96px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfcfd;
        white-space: pre-wrap;
      }

      .voice-state {
        margin-top: 10px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfcfd;
        color: var(--muted);
        font-size: 14px;
      }

      .ok {
        color: var(--ok);
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 820px) {
        main {
          width: min(100vw - 20px, 1180px);
          padding: 16px 0;
        }

        header,
        .layout {
          display: block;
        }

        .status {
          margin-top: 12px;
          text-align: left;
        }

        section + section {
          margin-top: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Qwen3-Omni 实时语音测试</h1>
        </div>
        <div id="status" class="status">未连接</div>
      </header>

      <div class="layout">
        <section>
          <h2>输入</h2>

          <label for="model">模型名</label>
          <input id="model" value="" />

          <div class="row">
            <div>
              <label for="prefillMs">chunk 间隔 ms</label>
              <input id="prefillMs" type="number" min="200" max="3000" step="100" value="600" />
            </div>
            <div>
              <label for="targetRate">后端采样率</label>
              <input id="targetRate" value="16000" disabled />
            </div>
          </div>

          <label for="prompt">最终推理提示词</label>
            <textarea id="prompt">你正在和用户进行实时语音对话。请直接理解用户想问什么，不要转写、复述或翻译语音内容。回答要像真人聊天一样自然、口语化、简短，优先用一两句话说清楚。只有问题确实复杂时再分点说明；不要啰嗦，不要输出无关解释。</textarea>

          <div class="actions">
            <button id="actionBtn" class="primary">开始录音</button>
          </div>

          <div class="metrics">
            <div class="metric">
              <span>chunk</span>
              <strong id="chunkCount">0</strong>
            </div>
            <div class="metric">
              <span>录音时长</span>
              <strong id="duration">0.0s</strong>
            </div>
            <div class="metric">
              <span>prefill</span>
              <strong id="prefillCount">0</strong>
            </div>
          </div>
        </section>

        <section>
          <h2>输出</h2>
          <pre id="log"></pre>
          <div class="result">
            <h2>模型结果</h2>
            <div id="resultText">等待录音。</div>
            <div id="voiceState" class="voice-state">倾听中</div>
          </div>
        </section>
      </div>
    </main>

    <script type="module">
      import { RealtimeAudioClient } from "/static/realtime-audio-client.js";

      const els = {
        status: document.getElementById("status"),
        model: document.getElementById("model"),
        prefillMs: document.getElementById("prefillMs"),
        targetRate: document.getElementById("targetRate"),
        prompt: document.getElementById("prompt"),
        actionBtn: document.getElementById("actionBtn"),
        chunkCount: document.getElementById("chunkCount"),
        duration: document.getElementById("duration"),
        prefillCount: document.getElementById("prefillCount"),
        log: document.getElementById("log"),
        resultText: document.getElementById("resultText"),
        voiceState: document.getElementById("voiceState"),
      };

      const client = new RealtimeAudioClient({
        getModel: () => els.model.value,
        getPrompt: () => els.prompt.value,
        getPrefillMs: () => els.prefillMs.value,
        getDisplayedText: () => els.resultText.textContent,
      });

      function appendLog(line, cls = "") {
        const ts = new Date().toLocaleTimeString();
        const text = `[${ts}] ${line}`;
        els.log.textContent += text + "\n";
        els.log.scrollTop = els.log.scrollHeight;
        if (cls === "error") {
          els.status.innerHTML = `<span class="error">${line}</span>`;
        }
      }

      function renderMode(mode) {
        els.actionBtn.disabled = false;
        els.actionBtn.className = mode === "speaking" ? "secondary" : "primary";
        if (mode === "idle") {
          els.actionBtn.textContent = "开始录音";
        } else if (mode === "recording") {
          els.actionBtn.textContent = "停止并推理";
        } else if (mode === "finalizing" || mode === "speaking") {
          els.actionBtn.textContent = "打断";
        } else {
          els.actionBtn.disabled = true;
        }
      }

      client.on("config", ({ config }) => {
        els.model.value = config.model || "";
        els.targetRate.value = String(config.target_sample_rate || 16000);
      });

      client.on("log", ({ message, level }) => appendLog(message, level));
      client.on("clearLog", () => {
        els.log.textContent = "";
      });
      client.on("status", ({ text, ok }) => {
        els.status.innerHTML = ok ? `<span class="ok">${text}</span>` : text;
      });
      client.on("voiceState", ({ text }) => {
        els.voiceState.textContent = text;
      });
      client.on("mode", ({ mode }) => renderMode(mode));
      client.on("metrics", ({ chunks, prefillOk, durationSeconds }) => {
        els.chunkCount.textContent = String(chunks);
        els.prefillCount.textContent = String(prefillOk);
        els.duration.textContent = `${durationSeconds.toFixed(1)}s`;
      });
      client.on("result", ({ text, append, replace }) => {
        if (append) {
          els.resultText.textContent += text || "";
        } else if (replace) {
          els.resultText.textContent = text || "";
        }
      });

      els.actionBtn.addEventListener("click", () => {
        client.handleAction().catch((err) => {
          client.setMode("idle");
          client.setVoiceState("倾听中");
          appendLog(err.message || String(err), "error");
        });
      });

      renderMode("idle");
      client.loadServerConfig().catch((err) => appendLog(err.message || String(err), "error"));
    </script>
  </body>
</html>
