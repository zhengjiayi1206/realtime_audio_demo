<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3 Omni Realtime</title>
<style>
  :root {
    --bg: #11140f;
    --panel: #f2eadc;
    --ink: #1f261c;
    --muted: #6e7469;
    --line: #d9cbb7;
    --accent: #d96c2c;
    --accent-dark: #a9471b;
    --ok: #2f7d4f;
    --danger: #b84032;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 10%, rgba(217,108,44,.28), transparent 28rem),
      radial-gradient(circle at 90% 20%, rgba(242,234,220,.18), transparent 26rem),
      linear-gradient(135deg, #10170f 0%, #2b241c 100%);
  }
  .wrap { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0; }
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
    gap: 18px;
    align-items: stretch;
  }
  .card {
    background: rgba(242,234,220,.94);
    border: 1px solid rgba(217,203,183,.85);
    border-radius: 22px;
    box-shadow: 0 24px 90px rgba(0,0,0,.32);
    overflow: hidden;
  }
  .intro { padding: 30px; position: relative; }
  .kicker { letter-spacing: .18em; text-transform: uppercase; color: var(--accent-dark); font-size: 12px; font-weight: 700; }
  h1 { margin: 12px 0 10px; font-size: clamp(34px, 6vw, 68px); line-height: .95; }
  .sub { color: var(--muted); max-width: 58ch; line-height: 1.7; }
  label { display: block; margin: 24px 0 8px; font-weight: 700; }
  textarea {
    width: 100%;
    min-height: 170px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 16px;
    background: #fffaf1;
    color: var(--ink);
    font: 16px/1.55 "Noto Serif SC", Georgia, serif;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,108,44,.18); }
  .control { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .status {
    min-height: 118px;
    border-radius: 18px;
    border: 1px dashed var(--line);
    padding: 18px;
    background: #fff7e9;
  }
  .state { font-size: 26px; font-weight: 700; }
  .hint { margin-top: 8px; color: var(--muted); line-height: 1.5; }
  .meter { height: 10px; border-radius: 999px; overflow: hidden; background: #d8c7ae; }
  .meter > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--ok), var(--accent)); transition: width 60ms linear; }
  .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button {
    border: 0;
    border-radius: 999px;
    padding: 14px 18px;
    font: 700 16px/1.1 "Noto Serif SC", Georgia, serif;
    cursor: pointer;
    color: #fffaf1;
    background: var(--accent);
  }
  button.secondary { background: #34392f; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  .conversation {
    margin-top: 18px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(280px, .55fr);
    gap: 18px;
  }
  .transcript, .log { padding: 18px; min-height: 360px; max-height: 520px; overflow: auto; }
  .bubble { padding: 12px 14px; border-radius: 16px; margin: 0 0 12px; line-height: 1.65; white-space: pre-wrap; }
  .assistant { background: #fff7e9; border: 1px solid var(--line); }
  .user { background: #263024; color: #f8eddc; margin-left: 14%; }
  .log {
    background: rgba(17,20,15,.88);
    color: #e9decf;
    font: 12px/1.6 Consolas, "Cascadia Code", monospace;
  }
  .log-line { border-bottom: 1px solid rgba(255,255,255,.08); padding: 4px 0; }
  @media (max-width: 860px) {
    .hero, .conversation { grid-template-columns: 1fr; }
    .buttons { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<main class="wrap">
  <section class="hero">
    <div class="card intro">
      <div class="kicker">LAN vLLM · /v1/realtime</div>
      <h1>Qwen3 Omni Realtime</h1>
      <p class="sub">无静默检测。点击“开始通话”后立即录音；每轮说完后点“结束本轮”，服务端提交音频并等待模型推理。模型回复结束后，页面会自动重新开启用户侧录音。</p>
      <label for="systemPrompt">System prompt</label>
      <textarea id="systemPrompt">你是一个自然、简洁的实时语音助手。请用中文回答，语气像正在电话沟通的人，不要输出 markdown。</textarea>
    </div>
    <div class="card control">
      <div class="status">
        <div class="state" id="state">未连接</div>
        <div class="hint" id="hint">输入 system prompt 后点击开始通话。</div>
      </div>
      <div class="meter"><div id="meter"></div></div>
      <div class="buttons">
        <button id="btnConnect">开始通话</button>
        <button id="btnTurn" class="secondary" disabled>结束本轮</button>
      </div>
      <button id="btnStop" class="secondary" disabled>断开服务</button>
    </div>
  </section>

  <section class="conversation">
    <div class="card transcript" id="transcript"></div>
    <div class="card log" id="log"></div>
  </section>
</main>

<script>
const TARGET_SAMPLE_RATE = 16000;

let ws = null;
let audioCtx = null;
let micStream = null;
let processor = null;
let sourceNode = null;
let recording = false;
let assistantBubble = null;
let playTime = 0;

const $ = (id) => document.getElementById(id);

$('btnConnect').onclick = startCall;
$('btnTurn').onclick = endTurn;
$('btnStop').onclick = stopCall;

async function startCall() {
  $('btnConnect').disabled = true;
  $('systemPrompt').disabled = true;
  clearPanels();
  setState('连接中', '正在连接本机 /ws/realtime，并由后端代理到 vLLM /v1/realtime。');

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/realtime`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = async () => {
    ws.send(JSON.stringify({
      type: 'start',
      system_prompt: $('systemPrompt').value,
      sample_rate: TARGET_SAMPLE_RATE
    }));
  };
  ws.onmessage = (event) => handleServerEvent(JSON.parse(event.data));
  ws.onerror = () => log('error', 'WebSocket 错误');
  ws.onclose = () => cleanupUi();
}

async function startRecording() {
  if (!ws || ws.readyState !== WebSocket.OPEN || recording) return;
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: TARGET_SAMPLE_RATE });
  }
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true }
  });
  sourceNode = audioCtx.createMediaStreamSource(micStream);
  processor = audioCtx.createScriptProcessor(4096, 1, 1);
  sourceNode.connect(processor);
  processor.connect(audioCtx.destination);
  recording = true;

  addUserBubble('用户录音中...');
  setState('录音中', '说完后点击“结束本轮”，不会自动用静默检测截断。');
  $('btnTurn').disabled = false;

  processor.onaudioprocess = (event) => {
    if (!recording || !ws || ws.readyState !== WebSocket.OPEN) return;
    const input = event.inputBuffer.getChannelData(0);
    $('meter').style.width = `${Math.min(100, rms(input) * 520)}%`;
    ws.send(floatToPcm16(input));
  };
}

function stopRecordingOnly() {
  recording = false;
  if (processor) {
    processor.disconnect();
    processor.onaudioprocess = null;
    processor = null;
  }
  if (sourceNode) {
    sourceNode.disconnect();
    sourceNode = null;
  }
  if (micStream) {
    micStream.getTracks().forEach((track) => track.stop());
    micStream = null;
  }
  $('meter').style.width = '0%';
}

function endTurn() {
  if (!recording || !ws) return;
  stopRecordingOnly();
  $('btnTurn').disabled = true;
  setState('推理中', '已提交本轮音频，等待 Qwen3 Omni 回复。');
  assistantBubble = addAssistantBubble('');
  ws.send(JSON.stringify({ type: 'user_end' }));
}

function stopCall() {
  stopRecordingOnly();
  if (ws) {
    ws.send(JSON.stringify({ type: 'stop' }));
    ws.close();
    ws = null;
  }
  if (audioCtx) {
    audioCtx.close().catch(() => {});
    audioCtx = null;
  }
  cleanupUi();
}

function handleServerEvent(data) {
  switch (data.type) {
    case 'ready':
      log('ready', `${data.upstream_url} model=${data.model}`);
      $('btnStop').disabled = false;
      startRecording().catch((err) => {
        log('mic', err.message);
        setState('麦克风失败', err.message);
      });
      break;
    case 'response_started':
      log('response', 'started');
      break;
    case 'text_delta':
      if (!assistantBubble) assistantBubble = addAssistantBubble('');
      assistantBubble.textContent += data.text || '';
      scrollTranscript();
      break;
    case 'audio_delta':
      log('audio_delta', `${data.audio ? data.audio.length : 0} base64 chars`);
      playPcm16Base64(data.audio, data.sample_rate_hz || 24000);
      break;
    case 'transcription_done':
      log('transcription_done', data.text || '(empty)');
      break;
    case 'response_done':
      if (!data.text) log('response_done', '(no text; upstream may be audio-only or failed before output)');
      log('response_done', data.text || '(audio only)');
      assistantBubble = null;
      startRecording().catch((err) => log('mic', err.message));
      break;
    case 'error':
      log('error', data.message || '');
      setState('错误', data.message || '服务端错误');
      $('btnTurn').disabled = true;
      break;
    case 'upstream_event':
      if (data.upstream_type) {
        const detail = data.data ? ` ${JSON.stringify(data.data).slice(0, 900)}` : '';
        log('upstream', `${data.upstream_type}${detail}`);
      }
      break;
    default:
      log(data.type || 'event', JSON.stringify(data).slice(0, 600));
  }
}

function floatToPcm16(float32) {
  const out = new ArrayBuffer(float32.length * 2);
  const view = new DataView(out);
  for (let i = 0; i < float32.length; i++) {
    const s = Math.max(-1, Math.min(1, float32[i]));
    view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  return out;
}

function playPcm16Base64(b64, sampleRate) {
  if (!audioCtx || !b64) return;
  const bin = atob(b64);
  const samples = new Float32Array(bin.length / 2);
  for (let i = 0; i < samples.length; i++) {
    const lo = bin.charCodeAt(i * 2);
    const hi = bin.charCodeAt(i * 2 + 1);
    let val = (hi << 8) | lo;
    if (val >= 0x8000) val -= 0x10000;
    samples[i] = val / 0x8000;
  }
  const buffer = audioCtx.createBuffer(1, samples.length, sampleRate || 24000);
  buffer.copyToChannel(samples, 0);
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  playTime = Math.max(playTime, now);
  src.start(playTime);
  playTime += buffer.duration;
}

function rms(samples) {
  let sum = 0;
  for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
  return Math.sqrt(sum / Math.max(1, samples.length));
}

function setState(state, hint) {
  $('state').textContent = state;
  $('hint').textContent = hint;
}

function addUserBubble(text) {
  const div = document.createElement('div');
  div.className = 'bubble user';
  div.textContent = text;
  $('transcript').appendChild(div);
  scrollTranscript();
  return div;
}

function addAssistantBubble(text) {
  const div = document.createElement('div');
  div.className = 'bubble assistant';
  div.textContent = text;
  $('transcript').appendChild(div);
  scrollTranscript();
  return div;
}

function scrollTranscript() {
  $('transcript').scrollTop = $('transcript').scrollHeight;
}

function log(type, text) {
  const div = document.createElement('div');
  div.className = 'log-line';
  div.textContent = `[${new Date().toLocaleTimeString('zh-CN', { hour12: false })}] ${type}: ${text}`;
  $('log').appendChild(div);
  $('log').scrollTop = $('log').scrollHeight;
}

function clearPanels() {
  $('transcript').innerHTML = '';
  $('log').innerHTML = '';
}

function cleanupUi() {
  stopRecordingOnly();
  $('btnConnect').disabled = false;
  $('btnTurn').disabled = true;
  $('btnStop').disabled = true;
  $('systemPrompt').disabled = false;
  setState('未连接', '输入 system prompt 后点击开始通话。');
}
</script>
</body>
</html>
